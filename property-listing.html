<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Listings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <strong>MyProperty</strong>
    <div>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <main class="listing-page">
    <h1>Available Properties</h1>

    <div class="property-grid">

      <div class="property-card">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" alt="Modern house">
        <div class="card-content">
          <h2>Modern Family House</h2>
          <p>📍 Mumbai, Maharashtra</p>
          <p class="price">₹75,00,000</p>
          <a class="btn" href="property-detail.html">View Details</a>
        </div>
      </div>

      <div class="property-card">
        <img src="https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?auto=format&fit=crop&w=800&q=80" alt="Luxury apartment">
        <div class="card-content">
          <h2>Luxury Apartment</h2>
          <p>📍 Delhi, India</p>
          <p class="price">₹55,00,000</p>
          <a class="btn" href="property-detail.html">View Details</a>
        </div>
      </div>

      <div class="property-card">
        <img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?auto=format&fit=crop&w=800&q=80" alt="Villa">
        <div class="card-content">
          <h2>Beautiful Villa</h2>
          <p>📍 Goa, India</p>
          <p class="price">₹1,20,00,000</p>
          <a class="btn" href="property-detail.html">View Details</a>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>© 2026 MyProperty. All rights reserved.</p>
  </footer>

</body>
</html>
